# Instruct model configs for the prefix-search step (Step 2)
#
# type: local  → load via vLLM on GPU
# type: api    → call via OpenAI-compatible HTTP API
#
# Models used in the paper:
#   Think model (Step 1) : Qwen/Qwen3-4B-Thinking-2507  (thinking mode on)
#   Instruct model       : Qwen/Qwen3-4B-Instruct-2507  (enable_thinking: false)
#   Grader               : Qwen/Qwen3-4B-Instruct-2507  (local vLLM, thinking mode off)
#
#   Other instruct models evaluated: Qwen3-8B, Qwen3-14B, Qwen2.5-7B-Instruct,
#                                    DeepSeek-V3

# LLM-as-judge grader — local vLLM server (start separately before running pipeline)
#
#   CUDA_VISIBLE_DEVICES=4,5 python -m vllm.entrypoints.openai.api_server \
#     --model Qwen/Qwen3-4B-Instruct-2507 \
#     --tensor-parallel-size 2 --max-model-len 32768 \
#     --port 8001 --served-model-name grader
grader:
  api_key:  "local"
  base_url: "http://127.0.0.1:8001/v1"
  model:    "grader"
  rpm:      300

models:
  # ── local GPU models ──────────────────────────────────────────────────────
  # Instruct model used in the paper
  - name:                 qwen3-4b-instruct
    type:                 local
    path:                 "Qwen/Qwen3-4B-Instruct-2507"   # or local path
    tensor_parallel_size: 4
    max_model_len:        32768
    max_new_tokens:       16384
    enable_thinking:      false   # disable Qwen3's built-in thinking mode

  # Other models evaluated in the paper:
  # - name: qwen3-8b         / path: Qwen/Qwen3-8B
  # - name: qwen3-14b        / path: Qwen/Qwen3-14B
  # - name: qwen2.5-7b-instruct / path: Qwen/Qwen2.5-7B-Instruct

  # ── API models (no GPU required) ─────────────────────────────────────────
  - name:        gpt-4o
    type:        api
    api_model:   "gpt-4o"
    api_key:     "<YOUR_API_KEY>"
    base_url:    "https://api.openai.com/v1"
    rpm:         30
    max_tokens:  16384
    temperature: 0.7
